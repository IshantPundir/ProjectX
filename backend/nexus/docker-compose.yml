services:
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Point to Supabase Postgres running on the host (not the old Docker postgres)
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@host.docker.internal:54322/postgres
      - REDIS_URL=redis://redis:6379/0
      # JWKS endpoint on the host's Supabase
      - SUPABASE_JWKS_URL=http://host.docker.internal:54321/auth/v1/.well-known/jwks.json
      # Supabase Admin API for auth user lifecycle (delete on deactivate)
      - SUPABASE_URL=http://host.docker.internal:54321
      # Issuer claim — Supabase GoTrue stamps `iss` with the URL it sees from
      # ITS OWN process (`127.0.0.1`), not the one we use to reach it. Without
      # this override every request fails with "Invalid issuer" 401.
      - SUPABASE_JWT_ISSUER=http://127.0.0.1:54321/auth/v1
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # OpenTelemetry — both exporters off by default. Values flow from .env
      # via env_file above; uncomment to override per-service. See
      # app/ai/otel.py for the env-var contract.
      # - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      # - OTEL_DEV_CONSOLE_EXPORTER=${OTEL_DEV_CONSOLE_EXPORTER}
      # - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-nexus}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  nexus-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@host.docker.internal:54322/postgres
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_JWKS_URL=http://host.docker.internal:54321/auth/v1/.well-known/jwks.json
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_JWT_ISSUER=http://127.0.0.1:54321/auth/v1
      # OpenTelemetry — same contract as the nexus service. Worker is a
      # separate process and runs its own TracerProvider (see app/worker.py).
      # - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      # - OTEL_DEV_CONSOLE_EXPORTER=${OTEL_DEV_CONSOLE_EXPORTER}
      # - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-nexus-worker}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ./engine-events:/tmp/engine-events
    command: dramatiq app.worker --processes 2 --threads 4

  nexus-engine:
    # Phase 3 — engine merged into nexus. Runs the single interview engine from
    # the same Docker image as nexus and nexus-worker, just with
    # `python -m app.modules.interview_engine` as the command. Reads SessionConfig
    # + writes SessionResult in-process via build_session_config /
    # record_session_result; no HTTP boundary, no JWT.
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@host.docker.internal:54322/postgres
      - REDIS_URL=redis://redis:6379/0
      # OpenTelemetry — same contract as nexus + nexus-worker. The engine
      # process runs its own TracerProvider (mirrors app/main.py's bootstrap).
      # - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      # - OTEL_DEV_CONSOLE_EXPORTER=${OTEL_DEV_CONSOLE_EXPORTER}
      # - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-nexus-engine}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      # Model files (HF turn-detector, etc.) are baked into the image at
      # /opt/hf-cache (see Dockerfile HF_HOME) and are deliberately NOT
      # volume-mounted here. A volume over the cache previously drifted
      # stale across a plugin upgrade and shadowed the image's freshly-built
      # models, breaking turn-detector init with
      # "Could not find file model_q8.onnx".
      # Persist per-session event-log envelopes (one JSON per session)
      # to the host so they survive container restarts and are readable
      # via `jq`/scripts. Default sink path = ENGINE_EVENT_LOG_DIR
      # (`/tmp/engine-events`). Switch to s3 sink when shipping to prod.
      - ./engine-events:/tmp/engine-events
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # AgentServer's built-in HTTP probe at port 8081/. Returns 200 when
      # the worker is registered with LiveKit, 503 otherwise. See
      # https://docs.livekit.io/agents/server/options/#health-check
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8081/', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: python -m app.modules.interview_engine start

  nexus-vision-worker:
    # Phase 3D vision — dedicated ONNX gaze-inference worker.
    # Runs on the -Q vision queue only; does NOT process default/jd/bank queues.
    # Built from Dockerfile.vision (onnxruntime + uniface + opencv + ffmpeg; no torch).
    build:
      context: .
      dockerfile: Dockerfile.vision
    restart: unless-stopped
    # Hard backstop: the worker can never exceed this many cores regardless of
    # any dependency's thread fan-out (2026-06-01 incident pegged ~23 cores).
    # Keep VISION_WORKER_CONCURRENCY <= this value.
    cpus: 4
    # GPU passthrough: grants the host NVIDIA GPU(s) so onnxruntime-gpu's
    # CUDAExecutionProvider runs the gaze + RetinaFace models on-device
    # (Settings.vision_onnx_providers). Requires nvidia-container-toolkit on the
    # host. Harmless if no GPU — providers fall back to CPU.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@host.docker.internal:54322/postgres
      - REDIS_URL=redis://redis:6379/0
      # NON-COMMERCIAL Gaze360 ONNX weights (dev/POC only — swap before GA).
      # Mounted read-only from ./models/ on the host (see Step 5 download command).
      - VISION_GAZE_WEIGHTS_PATH=/weights/resnet34_gaze.onnx
      # UNIFACE_CACHE_DIR is set in Dockerfile.vision (/opt/uniface-cache, a
      # nexus-owned dir with the RetinaFace model baked in at build time). No
      # named volume / env override here — that previously caused a root-owned
      # mount the non-root worker could not write to.
      - VISION_WORKER_CONCURRENCY=${VISION_WORKER_CONCURRENCY:-4}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      # NON-COMMERCIAL weights — mounted read-only. Must be downloaded manually:
      #   mkdir -p models && curl -L -o models/resnet34_gaze.onnx \
      #     https://github.com/yakhyo/gaze-estimation/releases/download/weights/resnet34_gaze.onnx
      - ./models:/weights:ro
    command: sh -c 'dramatiq app.vision_worker --processes ${VISION_WORKER_CONCURRENCY:-4} --threads 1 -Q vision'

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redisdata:
