services:
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Point to Supabase Postgres running on the host (not the old Docker postgres)
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@host.docker.internal:54322/postgres
      - REDIS_URL=redis://redis:6379/0
      # JWKS endpoint on the host's Supabase
      - SUPABASE_JWKS_URL=http://host.docker.internal:54321/auth/v1/.well-known/jwks.json
      # Supabase Admin API for auth user lifecycle (delete on deactivate)
      - SUPABASE_URL=http://host.docker.internal:54321
      # Issuer claim — Supabase GoTrue stamps `iss` with the URL it sees from
      # ITS OWN process (`127.0.0.1`), not the one we use to reach it. Without
      # this override every request fails with "Invalid issuer" 401.
      - SUPABASE_JWT_ISSUER=http://127.0.0.1:54321/auth/v1
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  nexus-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@host.docker.internal:54322/postgres
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_JWKS_URL=http://host.docker.internal:54321/auth/v1/.well-known/jwks.json
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_JWT_ISSUER=http://127.0.0.1:54321/auth/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: dramatiq app.worker --processes 2 --threads 4

  interview-engine:
    build:
      context: ..
      dockerfile: interview_engine/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Engine talks to nexus on the compose network — not host.docker.internal.
      - NEXUS_INTERNAL_BASE_URL=http://nexus:8000
      # Supabase Postgres for any *direct* DB access (none today; engine only
      # talks to nexus via HTTP). Kept here so engine debug shells can reach
      # it without re-defining.
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@host.docker.internal:54322/postgres
      - REDIS_URL=redis://redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      nexus:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redisdata:
