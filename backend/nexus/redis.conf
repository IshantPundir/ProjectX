# Redis persistence configuration for ProjectX dev/staging.
#
# AOF (Append Only File) is enabled so queued Dramatiq messages survive
# Redis restarts. Without this, a Redis crash drops all pending tasks
# and leaves jobs stuck in signals_extracting forever.
#
# For production, use a managed Redis with persistence guarantees
# (e.g. Upstash with persistence, Elasticache with Multi-AZ).

appendonly yes
appendfsync everysec
